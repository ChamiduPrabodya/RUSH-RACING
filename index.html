<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Car Racing</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <main id="stage" aria-label="Game stage">
      <canvas id="game" aria-label="2D car racing canvas"></canvas>

      <!-- INTRO -->
      <section id="intro" class="intro overlay" aria-label="Intro">
        <div class="introSmall">CREATED BY</div>
        <div class="introLogo">DCP GAMING</div>
        <div class="introHint">Tap to skip</div>
      </section>

      <!-- HUD -->
      <div id="hud" class="hud hidden" aria-live="polite">
        <div class="hudLeft">
          <button id="pauseBtn" class="iconBtn" aria-label="Pause">&#x23F8;</button>
        </div>
        <div class="hudRight">
          <div class="hudStat"><span class="k">Score</span><span id="hudScore" class="v">0</span></div>
          <div class="hudStat"><span class="k">Best</span><span id="hudBest" class="v">0</span></div>
        </div>
      </div>

      <!-- PAUSED -->
      <section id="pauseOverlay" class="overlay hidden" aria-label="Paused">
        <div class="pauseCard">
          <div class="pauseTitle">PAUSED</div>
          <div class="pauseBtns">
            <button id="pauseHomeBtn" class="sqBtn" aria-label="Home">&#x2302;</button>
            <button id="pauseRestartBtn" class="sqBtn" aria-label="Restart">&#x21BB;</button>
          </div>
        </div>
      </section>

      <!-- MENU -->
      <section id="menu" class="overlay hidden" aria-label="Main menu">
        <div class="title">
          <div class="titleLine">RUSH</div>
          <div class="titleLine">RACING</div>
        </div>

        <div class="themePicker" aria-label="Road type">
          <div class="themePickerLabel">CHOOSE ROAD</div>
          <div class="themePickerBtns">
            <button type="button" class="themeBtn active" data-theme="town" aria-pressed="true">
              <span class="themePreview themePreview--town" aria-hidden="true"></span>
              <span class="themeMeta">
                <span class="themeName">Town</span>
                <span class="themeDesc">Street lights + sidewalks</span>
              </span>
            </button>
            <button type="button" class="themeBtn" data-theme="village" aria-pressed="false">
              <span class="themePreview themePreview--village" aria-hidden="true"></span>
              <span class="themeMeta">
                <span class="themeName">Village</span>
                <span class="themeDesc">Grass + trees</span>
              </span>
            </button>
            <button type="button" class="themeBtn" data-theme="desert" aria-pressed="false">
              <span class="themePreview themePreview--desert" aria-hidden="true"></span>
              <span class="themeMeta">
                <span class="themeName">Desert</span>
                <span class="themeDesc">Cactus + rocks</span>
              </span>
            </button>
          </div>
        </div>

        <button id="playBtn" class="playBtn" aria-label="Play">
          <span>PLAY</span>
        </button>

        <button id="soundBtn" class="soundBtn" aria-label="Sound">
          <span id="soundIcon">&#x1F50A;</span>
        </button>

        
      </section>

      <!-- GAME OVER -->
      <section id="gameOver" class="overlay hidden" aria-label="Game over">
        <div class="gameOverCard">
          <div class="gameOverTitle">GAME OVER</div>
          <div class="gameOverStat">Score: <span id="goScore">0</span></div>
          <div class="gameOverStat">High Score: <span id="goBest">0</span></div>
          <div id="goNew" class="gameOverNew hidden">NEW</div>
          <div class="gameOverBtns">
            <button id="homeBtn" class="sqBtn" aria-label="Home">&#x2302;</button>
            <button id="restartBtn" class="sqBtn" aria-label="Restart">&#x21BB;</button>
          </div>
        </div>
      </section>

      <!-- Touch -->
      <div id="touch" class="touch hidden" aria-label="Touch controls">
        <button class="touchBtn" data-touch="left" aria-label="Left">&#x25C0;</button>
        <button class="touchBtn" data-touch="right" aria-label="Right">&#x25B6;</button>
      </div>
    </main>
  </div>

  <script src="game.js"></script>
</body>
</html>
